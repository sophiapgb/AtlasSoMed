<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AtlasSoMed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
  <style>
  /* ══════════════════════════════════
     VARIÁVEIS DE TEMA
  ══════════════════════════════════ */
  :root {
    --bg:      #f4f2ff;
    --surf:    #ffffff;
    --surf2:   #ede9fe;
    --prim:    #7c3aed;
    --prim-m:  #8b5cf6;
    --prim-l:  #a78bfa;
    --grad:    linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    --text:    #1e1b4b;
    --text2:   #5b21b6;
    --muted:   #9d84e8;
    --border:  #ddd6fe;
    --sh-sm:   0 2px 10px rgba(124,58,237,.09);
    --sh:      0 4px 24px rgba(124,58,237,.13);
    --r:       16px;
    --r-sm:    10px;
    --r-f:     9999px;
    --nav:     76px;
    --hdr:     60px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:    #09091a;
      --surf:  #111123;
      --surf2: #1a1a30;
      --text:  #ede9fe;
      --text2: #c4b5fd;
      --muted: #6d5fa6;
      --border:#2d2b50;
      --sh-sm: 0 2px 10px rgba(0,0,0,.45);
      --sh:    0 4px 24px rgba(0,0,0,.55);
    }
  }

  /* ══════════════════════════════════
     RESET & BASE
  ══════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--border);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    display: flex; justify-content: center;
  }
  #root {
    width: 100%; max-width: 480px; height: 100%;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    background: var(--bg);
  }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--prim-l); border-radius: 2px; }

  /* ══════════════════════════════════
     LAYOUT
  ══════════════════════════════════ */
  .hdr {
    height: var(--hdr);
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--sh-sm);
    flex-shrink: 0; z-index: 10;
    position: relative;
  }
  .btn-gear {
    position: absolute; right: 14px;
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    padding: 6px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: all .18s ease;
  }
  .btn-gear:hover { background: var(--surf2); color: var(--prim); }
  .btn-gear svg { width: 20px; height: 20px; }
  .logo {
    font-family: 'Sora', sans-serif;
    font-size: 1.45rem; font-weight: 700; letter-spacing: -.5px;
    display: flex; align-items: center; gap: 2px;
  }
  .logo-gem {
    width: 9px; height: 9px;
    background: var(--grad);
    border-radius: 3px; transform: rotate(45deg);
    margin-right: 7px; flex-shrink: 0;
  }
  .logo-so {
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 18px 16px calc(var(--nav) + 18px);
  }
  .page { width: 100%; }

  /* ══════════════════════════════════
     NAV INFERIOR
  ══════════════════════════════════ */
  .bnav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: var(--nav);
    background: var(--surf); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 6px 8px;
    box-shadow: 0 -4px 20px rgba(124,58,237,.1);
    z-index: 100;
  }
  .ni {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 7px 10px; border-radius: 12px;
    cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    font-family: 'Nunito', sans-serif;
    transition: all .18s ease; min-width: 52px;
  }
  .ni:hover { background: var(--surf2); color: var(--prim); }
  .ni.on    { background: var(--surf2); color: var(--prim); }
  .ni svg   { width: 20px; height: 20px; transition: transform .18s ease; }
  .ni.on svg { transform: scale(1.12); }
  .ni-l { font-size: .6rem; font-weight: 800; letter-spacing: .3px; }

  /* ══════════════════════════════════
     CABEÇALHO DE PÁGINA
  ══════════════════════════════════ */
  .ph { margin-bottom: 18px; }
  .ph-t { font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 3px; }
  .ph-s { font-size: .8rem; color: var(--muted); }

  /* ══════════════════════════════════
     CARD
  ══════════════════════════════════ */
  .card {
    background: var(--surf); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: var(--sh);
    padding: 18px; margin-bottom: 14px;
  }
  .card-t {
    font-family: 'Sora', sans-serif;
    font-size: .88rem; font-weight: 600; color: var(--text2);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-t svg { width: 16px; height: 16px; color: var(--prim); }

  /* ══════════════════════════════════
     FORMULÁRIOS
  ══════════════════════════════════ */
  .inp {
    width: 100%; padding: 10px 13px;
    border: 1.5px solid var(--border); border-radius: var(--r-sm);
    background: var(--surf); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: .87rem;
    outline: none; transition: border-color .18s, box-shadow .18s;
  }
  .inp:focus {
    border-color: var(--prim-m);
    box-shadow: 0 0 0 3px rgba(124,58,237,.12);
  }
  .inp::placeholder { color: var(--muted); }
  select.inp { cursor: pointer; }

  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  .row .inp { flex: 1; }
  .col { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

  /* ══════════════════════════════════
     BOTÕES
  ══════════════════════════════════ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px; border: none; border-radius: var(--r-sm);
    font-family: 'Nunito', sans-serif; font-size: .87rem; font-weight: 700;
    cursor: pointer; transition: all .18s ease; white-space: nowrap;
  }
  .btn-p {
    background: var(--grad); color: #fff;
    box-shadow: 0 4px 14px rgba(124,58,237,.32);
  }
  .btn-p:hover { box-shadow: 0 6px 20px rgba(124,58,237,.44); transform: translateY(-1px); }
  .btn-p:active { transform: none; }
  .btn-g { background: transparent; color: var(--prim); border: 1.5px solid var(--border); }
  .btn-g:hover { background: var(--surf2); }
  .btn-d {
    background: transparent; color: #ef4444;
    border: 1.5px solid transparent; padding: 6px 9px; font-size: .78rem;
  }
  .btn-d:hover { background: #fee2e2; border-color: #fca5a5; }
  @media (prefers-color-scheme: dark) { .btn-d:hover { background: #450a0a; } }
  .btn-w { width: 100%; }
  .btn-sm { padding: 7px 13px; font-size: .8rem; }

  /* ══════════════════════════════════
     PILLS / SELETOR DE DIA
  ══════════════════════════════════ */
  .pills {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 2px; margin-bottom: 14px;
    scrollbar-width: none;
  }
  .pills::-webkit-scrollbar { display: none; }
  .pill {
    padding: 7px 14px; border-radius: var(--r-f);
    border: 1.5px solid var(--border);
    background: var(--surf); color: var(--text2);
    font-size: .77rem; font-weight: 800;
    cursor: pointer; white-space: nowrap;
    transition: all .18s ease; font-family: 'Nunito', sans-serif;
  }
  .pill.on {
    background: var(--grad); color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 12px rgba(124,58,237,.3);
  }

  /* ══════════════════════════════════
     ITEM DE LISTA
  ══════════════════════════════════ */
  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: var(--surf); border-radius: var(--r-sm);
    border: 1px solid var(--border); margin-bottom: 8px;
    box-shadow: var(--sh-sm); transition: box-shadow .18s;
  }
  .item:hover { box-shadow: var(--sh); }
  .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .item-main { flex: 1; min-width: 0; }
  .item-title { font-size: .88rem; font-weight: 700; }
  .item-sub   { font-size: .75rem; color: var(--muted); margin-top: 1px; }

  /* ══════════════════════════════════
     BARRA DE PROGRESSO
  ══════════════════════════════════ */
  .track {
    height: 7px; background: var(--surf2);
    border-radius: var(--r-f); overflow: hidden; margin: 8px 0;
  }
  .fill { height: 100%; border-radius: var(--r-f); transition: width .4s ease; }
  input[type=range] { width: 100%; accent-color: var(--prim); cursor: pointer; }

  /* ══════════════════════════════════
     CARD DE MATÉRIA
  ══════════════════════════════════ */
  .mc {
    background: var(--surf); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: var(--sh-sm);
    padding: 15px 16px; margin-bottom: 11px;
    position: relative; overflow: hidden;
  }
  .mc-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .mc-inner { padding-left: 10px; }
  .mc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .mc-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: .92rem; }
  .mc-pct  { font-family: 'Sora', sans-serif; font-size: 1.15rem; font-weight: 700; }

  /* ══════════════════════════════════
     SELETOR DE COR
  ══════════════════════════════════ */
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2.5px solid transparent;
    transition: all .18s ease; flex-shrink: 0;
  }
  .swatch.on { border-color: var(--text); transform: scale(1.18); }

  /* ══════════════════════════════════
     CARD DE PROVA
  ══════════════════════════════════ */
  .pc {
    background: var(--surf); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: var(--sh-sm);
    padding: 15px 14px 15px 18px; margin-bottom: 11px;
    display: flex; align-items: flex-start; justify-content: space-between;
    position: relative; overflow: hidden; gap: 10px;
  }
  .pc-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .pc-name { font-family: 'Sora', sans-serif; font-weight: 600; font-size: .92rem; margin-bottom: 3px; }
  .pc-info { font-size: .75rem; color: var(--muted); margin-bottom: 8px; }

  /* badges de countdown */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: var(--r-f);
    font-size: .73rem; font-weight: 800;
  }
  .badge svg { width: 11px; height: 11px; }
  .b-g  { background: #d1fae5; color: #065f46; }
  .b-t  { background: #cffafe; color: #0e7490; }
  .b-y  { background: #fef3c7; color: #92400e; }
  .b-r  { background: #fee2e2; color: #991b1b; }
  .b-gr { background: var(--surf2); color: var(--muted); }
  .b-blue { background: #dbeafe; color: #1e40af; }
  .b-org  { background: #ffedd5; color: #c2410c; }
  .b-vio  { background: #ede9fe; color: #6d28d9; }
  @media (prefers-color-scheme: dark) {
    .b-g    { background: #064e3b; color: #6ee7b7; }
    .b-t    { background: #0c4a6e; color: #7dd3fc; }
    .b-y    { background: #78350f; color: #fcd34d; }
    .b-r    { background: #7f1d1d; color: #fca5a5; }
    .b-blue { background: #1e3a8a; color: #93c5fd; }
    .b-org  { background: #7c2d12; color: #fdba74; }
    .b-vio  { background: #3b0764; color: #c4b5fd; }
  }

  /* ══════════════════════════════════
     CARD DE PLANO
  ══════════════════════════════════ */
  .pi {
    background: var(--surf); border-radius: var(--r-sm);
    border: 1px solid var(--border); box-shadow: var(--sh-sm);
    padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .pi-hora {
    font-family: 'Sora', sans-serif; font-weight: 700;
    font-size: .82rem; color: var(--prim);
    min-width: 42px; text-align: center;
  }
  .pi-sep { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
  .pi-body { flex: 1; min-width: 0; }
  .pi-mat  { font-weight: 700; font-size: .87rem; }
  .pi-top  { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .dur-tag {
    font-size: .72rem; font-weight: 800; color: var(--prim-m);
    background: var(--surf2); padding: 3px 8px; border-radius: var(--r-f);
    white-space: nowrap;
  }

  /* ══════════════════════════════════
     HOME / STATS
  ══════════════════════════════════ */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat {
    background: var(--surf); border-radius: var(--r);
    border: 1px solid var(--border); box-shadow: var(--sh-sm); padding: 16px;
  }
  .stat-n {
    font-family: 'Sora', sans-serif; font-size: 1.8rem; font-weight: 700;
    background: var(--grad); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
  }
  .stat-l { font-size: .75rem; color: var(--muted); margin-top: 4px; }
  .today-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .today-row:last-child { border-bottom: none; padding-bottom: 0; }
  .today-hora { font-family: 'Sora', sans-serif; font-size: .8rem; font-weight: 700; color: var(--prim); min-width: 40px; }
  .today-desc { font-size: .87rem; font-weight: 600; }

  /* ══════════════════════════════════
     ESTADO VAZIO
  ══════════════════════════════════ */
  .empty { text-align: center; padding: 30px 16px; color: var(--muted); }
  .empty svg { width: 40px; height: 40px; margin: 0 auto 10px; opacity: .3; display: block; }
  .empty-t { font-weight: 700; font-size: .88rem; margin-bottom: 3px; }
  .empty-s { font-size: .77rem; }

  /* ══════════════════════════════════
     UTILITÁRIOS
  ══════════════════════════════════ */
  .f   { display: flex; }
  .ac  { align-items: center; }
  .jb  { justify-content: space-between; }
  .g6  { gap: 6px; }
  .g8  { gap: 8px; }
  .mb10 { margin-bottom: 10px; }
  .mb14 { margin-bottom: 14px; }
  .mt8  { margin-top: 8px; }
  .bold { font-weight: 700; }
  .sm   { font-size: .8rem; }
  .gt   { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .fi   { animation: fi .22s ease; }
  @keyframes fi { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

  /* ══════════════════════════════════
     FAB & CALENDÁRIO
  ══════════════════════════════════ */
  .fab-plus {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--grad); color: #fff; border: none;
    font-size: 1.7rem; font-weight: 300; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(124,58,237,.42);
    transition: all .18s ease;
  }
  .fab-plus:hover { box-shadow: 0 6px 26px rgba(124,58,237,.58); transform: scale(1.07); }
  .cal-panel-bg {
    position: absolute; inset: 0; z-index: 149;
    background: rgba(0,0,0,.38); animation: fi .18s ease;
  }
  .cal-panel {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 80%; background: var(--surf);
    border-left: 1px solid var(--border);
    box-shadow: -6px 0 30px rgba(0,0,0,.28);
    z-index: 150; overflow-y: auto; padding: 20px 16px;
    animation: slideR .2s ease;
  }
  @keyframes slideR { from { transform: translateX(100%); } to { transform: translateX(0); } }

  /* ══════════════════════════════════
     ABA IMPORTAR
  ══════════════════════════════════ */
  .status-ok {
    background: #d1fae5; color: #065f46;
    padding: 10px 14px; border-radius: var(--r-sm);
    font-size: .82rem; font-weight: 700; margin-bottom: 14px;
  }
  .status-err {
    background: #fee2e2; color: #991b1b;
    padding: 10px 14px; border-radius: var(--r-sm);
    font-size: .82rem; font-weight: 700; margin-bottom: 14px;
  }
  @media (prefers-color-scheme: dark) {
    .status-ok  { background: #064e3b; color: #6ee7b7; }
    .status-err { background: #7f1d1d; color: #fca5a5; }
  }
  .imp-section {
    font-size: .72rem; font-weight: 800; color: var(--text2);
    letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px;
  }
  .imp-tag {
    font-size: .8rem; padding: 4px 8px;
    background: var(--surf2); border-radius: 6px; color: var(--text);
  }
  .imp-ev {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 6px 10px; background: var(--surf2);
    border-radius: 8px; margin-bottom: 4px; font-size: .82rem;
  }
  .imp-ev-hora { color: var(--prim); font-weight: 700; margin-right: 8px; }
  .btn-x { background:transparent; border:none; color:var(--muted); cursor:pointer;
            font-size:.9rem; padding:0 4px; line-height:1; flex-shrink:0; }
  .btn-x:hover { color:#ef4444; }

  /* ══════════════════════════════════
     MODAL CONFIGURAÇÕES
  ══════════════════════════════════ */
  .modal-overlay {
    position: absolute; inset: 0; z-index: 200;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    backdrop-filter: blur(3px);
    animation: fi .18s ease;
  }
  .modal {
    background: var(--surf); border-radius: var(--r);
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,.45);
    width: 100%; padding: 22px 20px;
  }
  .modal-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-tit {
    font-family: 'Sora', sans-serif; font-size: 1.05rem; font-weight: 700;
  }
  .modal-close {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.1rem; padding: 4px 6px;
    border-radius: 6px; line-height: 1; transition: all .15s;
  }
  .modal-close:hover { background: var(--surf2); color: var(--text); }
  .modal-label {
    font-size: .75rem; font-weight: 700; color: var(--text2);
    margin-bottom: 7px; display: block;
  }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

/* ── Helpers ─────────────────────────────────────── */
const ls  = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
const lss = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const uid = () => Math.random().toString(36).slice(2, 9);

const CORES = [
  '#8b5cf6','#a855f7','#ec4899','#ef4444',
  '#f59e0b','#10b981','#3b82f6','#06b6d4',
  '#6366f1','#84cc16',
];

const TIPOS = [
  { k:'compromisso', l:'Compromisso pessoal', cor:'#8b5cf6' },
  { k:'falta',       l:'Falta planejada',     cor:'#ef4444' },
  { k:'lembrete',    l:'Lembrete',            cor:'#f59e0b' },
  { k:'entrega',     l:'Entrega',             cor:'#10b981' },
];

const DIAS = [
  { k:'seg', l:'SEG', ext:'Segunda'  },
  { k:'ter', l:'TER', ext:'Terça'    },
  { k:'qua', l:'QUA', ext:'Quarta'   },
  { k:'qui', l:'QUI', ext:'Quinta'   },
  { k:'sex', l:'SEX', ext:'Sexta'    },
  { k:'sab', l:'SÁB', ext:'Sábado'   },
  { k:'dom', l:'DOM', ext:'Domingo'  },
];
const AGENDA_VAZIA = { seg:[], ter:[], qua:[], qui:[], sex:[], sab:[], dom:[] };
const JS2KEY = ['dom','seg','ter','qua','qui','sex','sab'];
const hojek  = () => JS2KEY[new Date().getDay()];

function countdown(dataStr) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const alvo  = new Date(dataStr + 'T00:00:00');
  const diff  = Math.round((alvo - hoje) / 86400000);
  if (diff <  0)  return { lbl:'Expirada',     cls:'b-gr', cor:'#9ca3af' };
  if (diff === 0) return { lbl:'Hoje!',         cls:'b-r',  cor:'#ef4444' };
  if (diff <=  3) return { lbl:`${diff}d`,      cls:'b-r',  cor:'#ef4444' };
  if (diff <=  7) return { lbl:`${diff} dias`,  cls:'b-y',  cor:'#f59e0b' };
  if (diff <= 14) return { lbl:`${diff} dias`,  cls:'b-t',  cor:'#06b6d4' };
  return               { lbl:`${diff} dias`,  cls:'b-g',  cor:'#10b981' };
}

function perfGrad(p) {
  if (p < 40) return 'linear-gradient(135deg,#ef4444,#f87171)';
  if (p < 70) return 'linear-gradient(135deg,#f59e0b,#fbbf24)';
  return            'linear-gradient(135deg,#10b981,#34d399)';
}

function TabInicio({ agenda, materias, provas }) {
  const hk = hojek();
  const diaHoje    = DIAS.find(d => d.k === hk);
  const aulasHoje  = [...(agenda[hk] || [])].sort((a,b) => a.hora.localeCompare(b.hora));
  const proxProvas = [...provas]
    .filter(p => { const d = new Date(p.data+'T00:00:00'), h = new Date(); h.setHours(0,0,0,0); return d >= h; })
    .sort((a,b) => a.data.localeCompare(b.data))
    .slice(0, 3);
  const mediaPerf = materias.length
    ? Math.round(materias.reduce((s,m) => s + m.perf, 0) / materias.length)
    : 0;
  const dataFmt = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });

  return (
    <div>
      <div className="ph">
        <div className="ph-t">Olá! 👋</div>
        <div className="ph-s">{diaHoje?.ext} · {dataFmt}</div>
      </div>

      <div className="stats">
        <div className="stat fi">
          <div className="stat-n">{materias.length}</div>
          <div className="stat-l">Matérias</div>
        </div>
        <div className="stat fi">
          <div className="stat-n">{provas.length}</div>
          <div className="stat-l">Provas</div>
        </div>
        <div className="stat fi">
          <div className="stat-n">{mediaPerf}%</div>
          <div className="stat-l">Média geral</div>
        </div>
        <div className="stat fi">
          <div className="stat-n">{aulasHoje.length}</div>
          <div className="stat-l">Aulas hoje</div>
        </div>
      </div>

      <div className="card fi">
        <div className="card-t"><IcoCal/> Hoje — {diaHoje?.ext}</div>
        {aulasHoje.length === 0
          ? <div style={{fontSize:'.82rem',color:'var(--muted)',textAlign:'center',padding:'8px 0'}}>Nenhuma aula para hoje</div>
          : aulasHoje.map((a,i) => (
            <div key={i} className="today-row">
              {a.cor && <div style={{width:8,height:8,borderRadius:'50%',background:a.cor,flexShrink:0}}/>}
              <div className="today-hora" style={a.cor ? {color:a.cor} : {}}>{a.hora}</div>
              <div className="today-desc">{a.desc}</div>
            </div>
          ))
        }
      </div>

      {proxProvas.length > 0 && (
        <div className="card fi">
          <div className="card-t"><IcoClock/> Próximas Provas</div>
          {proxProvas.map((p,i) => {
            const cd = countdown(p.data);
            const isLast = i === proxProvas.length - 1;
            return (
              <div key={p.id} className="f ac jb"
                style={{paddingBottom: isLast?0:12, marginBottom: isLast?0:12,
                        borderBottom: isLast?'none':'1px solid var(--border)'}}>
                <div>
                  <div className="bold" style={{fontSize:'.88rem'}}>{p.nome}</div>
                  {p.materia && <div className="sm" style={{color:'var(--muted)'}}>{p.materia}</div>}
                </div>
                <span className={`badge ${cd.cls}`}><IcoClock/>{cd.lbl}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

   ABA: AGENDA

function TabAgenda({ agenda, setAgenda, eventos, setEventos, schedule, cronograma }) {
  const [view,      setView]      = useState('lista');
  const [diaK,      setDiaK]      = useState(hojek);
  const [semOff,    setSemOff]    = useState(0);
  const [mesOff,    setMesOff]    = useState(0);
  const [diaAberto, setDiaAberto] = useState(null); // 'YYYY-MM-DD'
  const [showForm,  setShowForm]  = useState(false);
  const [hora,      setHora]      = useState('');
  const [desc,      setDesc]      = useState('');
  const [fTit,  setFTit]  = useState('');
  const [fData, setFData] = useState('');
  const [fHora, setFHora] = useState('');
  const [fTipo, setFTipo] = useState('compromisso');
  const [fCor,  setFCor]  = useState('#8b5cf6');

  const salvAgenda  = (n) => { setAgenda(n);  lss('atlas_agenda',  n); };
  const salvEventos = (n) => { setEventos(n); lss('atlas_eventos', n); };

  const addAula = () => {
    if (!hora || !desc.trim()) return;
    salvAgenda({ ...agenda, [diaK]: [...(agenda[diaK]||[]), { id:uid(), hora, desc:desc.trim() }] });
    setDesc('');
  };
  const delAula = (id) => salvAgenda({ ...agenda, [diaK]: (agenda[diaK]||[]).filter(e=>e.id!==id) });

  const addEvento = () => {
    if (!fTit.trim() || !fData) return;
    salvEventos([...eventos, { id:uid(), titulo:fTit.trim(), data:fData, hora:fHora, tipo:fTipo, cor:fCor }]);
    setFTit(''); setFData(''); setFHora(''); setFTipo('compromisso'); setFCor('#8b5cf6');
    setShowForm(false);
  };
  const delEvento = (id) => salvEventos(eventos.filter(e=>e.id!==id));

  const openForm = (preDate) => {
    if (preDate) setFData(preDate); else setFData('');
    setShowForm(true);
  };

  /* ── Semana ── */
  const weekDates = (() => {
    const hoje = new Date(), dow = hoje.getDay();
    const mon  = new Date(hoje);
    mon.setDate(hoje.getDate() + (dow===0?-6:1-dow) + semOff*7);
    mon.setHours(0,0,0,0);
    return DIAS.map((d,i) => {
      const dt = new Date(mon); dt.setDate(mon.getDate()+i);
      const ds = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      return { ...d, date:ds, num:dt.getDate() };
    });
  })();
  const diaInfo    = weekDates.find(d=>d.k===diaK)||weekDates[0];
  const selDate    = diaInfo.date;
  const evsDia     = eventos.filter(e=>e.data===selDate);
  const faltasDia  = evsDia.filter(e=>e.tipo==='falta');
  const aulasNoDia = [...(agenda[diaK]||[])].sort((a,b)=>a.hora.localeCompare(b.hora));
  const faltaDeAula  = (a) => faltasDia.find(f=>!f.hora||f.hora===a.hora);
  const scheduleFor  = (ev, date) => {
    const pool = [...(schedule||[]), ...(cronograma||[])];
    if (!pool.length) return null;
    const base = ev.desc.split('—')[0].trim().toLowerCase();
    return pool.find(s =>
      s.date === date &&
      (s.subject.toLowerCase().includes(base) || base.includes(s.subject.toLowerCase()))
    ) || null;
  };

  /* ── Calendário ── */
  const hoje     = new Date();
  const calBase  = new Date(hoje.getFullYear(), hoje.getMonth()+mesOff, 1);
  const calAno   = calBase.getFullYear();
  const calMes   = calBase.getMonth();
  const diasMes  = new Date(calAno,calMes+1,0).getDate();
  const primDow  = new Date(calAno,calMes,1).getDay();
  const startOff = primDow===0?6:primDow-1;
  const hojeStr  = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
  const mesNome  = calBase.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const calDs    = (d) => `${calAno}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const calDk    = (d) => JS2KEY[new Date(calAno,calMes,d).getDay()];
  const dotsFor  = (d) => {
    const dateStr=calDs(d), dayKey=calDk(d);
    const ac=(agenda[dayKey]||[]).map(a=>a.cor||'#8b5cf6');
    const ec=eventos.filter(e=>e.data===dateStr).map(e=>e.cor);
    return [...ac,...ec].slice(0,4);
  };

  const calCells=[];
  for(let i=0;i<startOff;i++) calCells.push(null);
  for(let d=1;d<=diasMes;d++) calCells.push(d);
  while(calCells.length%7!==0) calCells.push(null);

  /* ── Painel lateral ── */
  const panDk    = diaAberto ? JS2KEY[new Date(diaAberto+'T00:00:00').getDay()] : null;
  const panAulas = diaAberto ? [...(agenda[panDk]||[])].sort((a,b)=>a.hora.localeCompare(b.hora)) : [];
  const panEvs   = diaAberto ? eventos.filter(e=>e.data===diaAberto) : [];
  const panFmt   = diaAberto
    ? new Date(diaAberto+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})
    : '';

  return (
    <>
      {/* ═══ CONTEÚDO ═══ */}
      <div>
        {/* Header com toggle */}
        <div className="ph">
          <div className="f ac jb">
            <div>
              <div className="ph-t">Agenda</div>
              <div className="ph-s">{view==='lista'?'Aulas e compromissos':mesNome}</div>
            </div>
            <div style={{display:'flex',background:'var(--surf2)',borderRadius:'var(--r-f)',padding:3,flexShrink:0}}>
              {[['lista','Lista'],['cal','Mês']].map(([v,l])=>(
                <button key={v} onClick={()=>setView(v)} style={{
                  padding:'5px 14px',borderRadius:'var(--r-f)',border:'none',
                  background:view===v?'var(--prim)':'transparent',
                  color:view===v?'#fff':'var(--muted)',
                  fontSize:'.72rem',fontWeight:800,cursor:'pointer',transition:'all .15s',
                }}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        {/* ── Lista Diária ── */}
        {view==='lista'&&(
          <>
            <div className="f ac g6 mb10">
              <button className="btn btn-g btn-sm" style={{padding:'6px 10px',flexShrink:0}} onClick={()=>setSemOff(s=>s-1)}>‹</button>
              <div className="pills" style={{flex:1,margin:0}}>
                {weekDates.map(d=>(
                  <button key={d.k} className={`pill ${diaK===d.k?'on':''}`} onClick={()=>setDiaK(d.k)}
                    style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'5px 9px'}}>
                    <span style={{fontSize:'.62rem',fontWeight:800,letterSpacing:'.3px'}}>{d.l}</span>
                    <span style={{fontSize:'.58rem',opacity:.75}}>{d.num}</span>
                  </button>
                ))}
              </div>
              <button className="btn btn-g btn-sm" style={{padding:'6px 10px',flexShrink:0}} onClick={()=>setSemOff(s=>s+1)}>›</button>
            </div>
            {semOff!==0&&(
              <button className="btn btn-g btn-sm btn-w mb10" onClick={()=>setSemOff(0)}>Semana atual</button>
            )}
            <div className="card">
              <div className="card-t"><IcoCal/> Adicionar Aula Fixa</div>
              <div className="row">
                <input className="inp" type="time" value={hora} onChange={e=>setHora(e.target.value)} style={{flex:'0 0 112px'}}/>
                <input className="inp" value={desc} onChange={e=>setDesc(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addAula()} placeholder="Ex: Anatomia — Sala 3"/>
              </div>
              <button className="btn btn-p btn-w btn-sm" onClick={addAula}>Adicionar</button>
            </div>
            {aulasNoDia.length===0&&evsDia.length===0
              ? <div className="empty fi"><IcoCal/><div className="empty-t">Sem eventos</div><div className="empty-s">Nenhuma aula para {diaInfo.ext}</div></div>
              : <>
                  {aulasNoDia.map(ev=>{
                    const f         = faltaDeAula(ev);
                    const sched     = scheduleFor(ev, selDate);
                    const nomeBase  = ev.desc.split('—')[0].trim();
                    const localFb   = ev.desc.includes('—') ? ev.desc.split('—').slice(1).join('—').trim() : '';
                    const local     = sched?.location || localFb;
                    const isPratica = sched?.type === 'pratica';
                    const isEspec   = sched?.type === 'especial';
                    const jaleco    = sched?.requiresJaleco;
                    return (
                      <div key={ev.id} className="item fi"
                        style={{alignItems:'flex-start',...(f?{opacity:.55}:{})}}>
                        <div className="item-dot" style={{background:ev.cor||'var(--prim)',marginTop:5,flexShrink:0}}/>
                        <div className="item-main">
                          <div style={{fontWeight:800,fontSize:'.82rem',letterSpacing:'.4px',
                                       textTransform:'uppercase',lineHeight:1.2}}>
                            {f&&'🚫 '}{nomeBase}
                            {f&&<span style={{fontSize:'.7rem',color:'#ef4444',marginLeft:5,textTransform:'none'}}>falta</span>}
                          </div>
                          {sched?.theme&&(
                            <div style={{fontSize:'.76rem',color:'var(--prim-l)',marginTop:3,lineHeight:1.35}}>
                              {sched.theme}
                            </div>
                          )}
                          <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4,flexWrap:'wrap'}}>
                            <span style={{fontSize:'.74rem',fontWeight:700,color:ev.cor||'var(--muted)',
                                          fontFamily:'Sora,sans-serif'}}>{ev.hora}</span>
                            {local&&<span style={{fontSize:'.72rem',color:'var(--muted)'}}>· {local}</span>}
                          </div>
                          {(isPratica||isEspec||jaleco)&&(
                            <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                              {isPratica&&<span className="badge b-blue" style={{fontSize:'.67rem',padding:'2px 8px'}}>Prática</span>}
                              {jaleco&&<span className="badge b-org"  style={{fontSize:'.67rem',padding:'2px 8px'}}>🥼 Levar jaleco</span>}
                              {isEspec&&<span className="badge b-vio"  style={{fontSize:'.67rem',padding:'2px 8px'}}>Especial</span>}
                            </div>
                          )}
                        </div>
                        <button className="btn btn-d btn-sm" style={{flexShrink:0,marginTop:-2}}
                          onClick={()=>delAula(ev.id)}><IcoTrash/></button>
                      </div>
                    );
                  })}
                  {evsDia.map(ev=>{
                    const isFalta=ev.tipo==='falta';
                    return (
                      <div key={ev.id} className="item fi"
                        style={isFalta?{borderLeft:'3px solid #ef4444',paddingLeft:11}:{}}>
                        <div className="item-dot" style={{background:ev.cor}}/>
                        <div className="item-main">
                          <div className="item-title">{isFalta&&'🚫 '}{ev.titulo}</div>
                          <div className="item-sub" style={{color:ev.cor}}>
                            {ev.hora?`${ev.hora} · `:''}{TIPOS.find(t=>t.k===ev.tipo)?.l}
                          </div>
                        </div>
                        <button className="btn btn-d btn-sm" onClick={()=>delEvento(ev.id)}><IcoTrash/></button>
                      </div>
                    );
                  })}
                </>
            }
          </>
        )}

        {/* ── Calendário Mensal ── */}
        {view==='cal'&&(
          <>
            <div className="f ac jb mb14">
              <button className="btn btn-g btn-sm" style={{padding:'6px 10px'}} onClick={()=>setMesOff(m=>m-1)}>‹</button>
              <span style={{fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:'.88rem',textTransform:'capitalize'}}>
                {mesNome}
              </span>
              <button className="btn btn-g btn-sm" style={{padding:'6px 10px'}} onClick={()=>setMesOff(m=>m+1)}>›</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:3}}>
              {['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(h=>(
                <div key={h} style={{textAlign:'center',fontSize:'.6rem',fontWeight:800,color:'var(--muted)',paddingBottom:4}}>{h}</div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
              {calCells.map((d,i)=>{
                if(!d) return <div key={i}/>;
                const dateStr=calDs(d), isHoje=dateStr===hojeStr;
                const dots=dotsFor(d);
                const hasFlt=eventos.some(e=>e.data===dateStr&&e.tipo==='falta');
                return (
                  <div key={i} onClick={()=>setDiaAberto(dateStr)}
                    style={{
                      minHeight:46,borderRadius:8,padding:'5px 3px 4px',
                      background:isHoje?'var(--prim)':'var(--surf)',
                      border:isHoje?'none':'1px solid var(--border)',
                      cursor:'pointer',display:'flex',flexDirection:'column',
                      alignItems:'center',gap:2,transition:'background .12s',
                    }}>
                    <span style={{fontSize:'.72rem',fontWeight:isHoje?800:500,lineHeight:1,
                                  color:isHoje?'#fff':'var(--text)'}}>{d}</span>
                    <div style={{display:'flex',flexWrap:'wrap',gap:2,justifyContent:'center',maxWidth:28}}>
                      {dots.slice(0,3).map((c,j)=>(
                        <div key={j} style={{width:4,height:4,borderRadius:'50%',background:c}}/>
                      ))}
                      {dots.length>3&&<div style={{width:4,height:4,borderRadius:'50%',background:'var(--muted)'}}/>}
                    </div>
                    {hasFlt&&<span style={{fontSize:'.5rem',lineHeight:1}}>🚫</span>}
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* FAB */}
        <div style={{position:'sticky',bottom:'calc(var(--nav) + 12px)',
                     display:'flex',justifyContent:'flex-end',
                     marginTop:16,pointerEvents:'none',zIndex:50}}>
          <button className="fab-plus" style={{pointerEvents:'all'}}
            onClick={()=>openForm(view==='cal'&&diaAberto?diaAberto:null)}>+</button>
        </div>
      </div>

      {/* ═══ PAINEL LATERAL CALENDÁRIO ═══ */}
      {diaAberto&&(
        <>
          <div className="cal-panel-bg" onClick={()=>setDiaAberto(null)}/>
          <div className="cal-panel">
            <div className="f ac jb" style={{marginBottom:16}}>
              <div>
                <div style={{fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:'.88rem',
                              textTransform:'capitalize',lineHeight:1.2}}>{panFmt}</div>
                <div style={{fontSize:'.72rem',color:'var(--muted)',marginTop:4}}>
                  {panAulas.length} aula(s) · {panEvs.length} evento(s)
                </div>
              </div>
              <button className="modal-close" onClick={()=>setDiaAberto(null)}>✕</button>
            </div>

            {panAulas.length===0&&panEvs.length===0&&(
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:'.82rem',padding:'16px 0'}}>
                Sem eventos neste dia.
              </div>
            )}

            {panAulas.map(ev=>{
              const f=panEvs.find(e=>e.tipo==='falta'&&(!e.hora||e.hora===ev.hora));
              return (
                <div key={ev.id} className="item" style={{marginBottom:6,...(f?{opacity:.5}:{})}}>
                  <div className="item-dot" style={{background:ev.cor||'var(--prim)'}}/>
                  <div className="item-main">
                    <div className="item-title">{f&&'🚫 '}{ev.desc}</div>
                    <div className="item-sub" style={{color:ev.cor||'var(--muted)'}}>{ev.hora}</div>
                  </div>
                </div>
              );
            })}

            {panEvs.map(ev=>(
              <div key={ev.id} className="item" style={{marginBottom:6,borderLeft:`3px solid ${ev.cor}`,paddingLeft:11}}>
                <div className="item-dot" style={{background:ev.cor}}/>
                <div className="item-main">
                  <div className="item-title">{ev.tipo==='falta'&&'🚫 '}{ev.titulo}</div>
                  <div className="item-sub" style={{color:ev.cor}}>
                    {ev.hora?`${ev.hora} · `:''}{TIPOS.find(t=>t.k===ev.tipo)?.l}
                  </div>
                </div>
                <button className="btn btn-d btn-sm" onClick={()=>delEvento(ev.id)}><IcoTrash/></button>

            <button className="btn btn-p btn-w btn-sm" style={{marginTop:12}}
              onClick={()=>{const d=diaAberto; setDiaAberto(null); openForm(d);}}>
              + Evento neste dia
            </button>

      {/* ═══ MODAL NOVO EVENTO ═══ */}
      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <span className="modal-tit">Novo Evento</span>
              <button className="modal-close" onClick={()=>setShowForm(false)}>✕</button>
            </div>
            <div className="col">
              <input className="inp" value={fTit} onChange={e=>setFTit(e.target.value)}
                placeholder="Título do evento…"/>
              <div className="row" style={{marginBottom:0}}>
                <input className="inp" type="date" value={fData} onChange={e=>setFData(e.target.value)}/>
                <input className="inp" type="time" value={fHora} onChange={e=>setFHora(e.target.value)}/>
              </div>
              <select className="inp" value={fTipo} onChange={e=>{
                const t=TIPOS.find(x=>x.k===e.target.value);
                setFTipo(e.target.value); setFCor(t?.cor||'#8b5cf6');
              }}>
                {TIPOS.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select>
              <div className="f ac g8">
                <span className="sm" style={{color:'var(--muted)',whiteSpace:'nowrap'}}>Cor:</span>
                <div className="swatches">
                  {CORES.map(c=>(
                    <div key={c} className={`swatch ${fCor===c?'on':''}`}
                      style={{background:c}} onClick={()=>setFCor(c)}/>
                  ))}
                </div>
              </div>
            </div>
            <button className="btn btn-p btn-w" onClick={addEvento}>Salvar Evento</button>
          </div>
        </div>
      )}
    </>
  );
}

function TabMaterias({ materias, setMaterias }) {
  const [nome, setNome] = useState('');
  const [cor,  setCor]  = useState(CORES[0]);

  const salvar = (list) => { setMaterias(list); lss('atlas_mat', list); };
  const add = () => {
    if (!nome.trim()) return;
    salvar([...materias, { id:uid(), nome:nome.trim(), cor, perf:50 }]);
    setNome('');
  };
  const del  = (id)       => salvar(materias.filter(m => m.id !== id));
  const upd  = (id, perf) => salvar(materias.map(m => m.id===id ? {...m, perf:+perf} : m));

  return (
    <div>
      <div className="ph">
        <div className="ph-t">Matérias</div>
        <div className="ph-s">Registre desempenho em cada disciplina</div>
      </div>

      <div className="card">
        <div className="card-t"><IcoBook/> Nova Matéria</div>
        <div className="col">
          <input className="inp" value={nome} onChange={e=>setNome(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Nome da disciplina…"/>
          <div className="f ac g8">
            <span className="sm" style={{color:'var(--muted)',whiteSpace:'nowrap'}}>Cor:</span>
            <div className="swatches">
              {CORES.map(c => (
                <div key={c} className={`swatch ${cor===c?'on':''}`}
                  style={{background:c}} onClick={()=>setCor(c)}/>
              ))}
            </div>
          </div>
        </div>
        <button className="btn btn-p btn-w btn-sm" onClick={add}>Adicionar</button>
      </div>

      {materias.length === 0
        ? <div className="empty fi"><IcoBook/><div className="empty-t">Nenhuma matéria</div><div className="empty-s">Adicione sua primeira disciplina</div></div>
        : materias.map(m => (
          <div key={m.id} className="mc fi">
            <div className="mc-bar" style={{background:m.cor}}/>
            <div className="mc-inner">
              <div className="mc-top">
                <div className="mc-name">{m.nome}</div>
                <div className="f ac g6">
                  <div className="mc-pct" style={{color:m.cor}}>{m.perf}%</div>
                  <button className="btn btn-d btn-sm" onClick={()=>del(m.id)}><IcoTrash/></button>
                </div>
              </div>
              <div className="track">
                <div className="fill" style={{width:m.perf+'%', background:perfGrad(m.perf)}}/>
              </div>
              <input type="range" min="0" max="100" value={m.perf}
                style={{accentColor:m.cor}}
                onChange={e=>upd(m.id, e.target.value)}/>
            </div>
          </div>
        ))
      }
    </div>
  );
}

function TabProvas({ provas, setProvas, materias }) {

  const add = () => {
    if (!nome.trim() || !data) return;
    salvar([...provas, { id:uid(), nome:nome.trim(), materia:mat, data }]);

  return (

/* ══════════════════════════════════════════════════
   ABA: IMPORTAR
══════════════════════════════════════════════════ */
function TabImportar({ apiKey, agenda, setAgenda, materias, setMaterias, cronograma, setCronograma }) {
  const [loadingGrade,  setLoadingGrade]  = useState(false);
  const [loadingEmenta, setLoadingEmenta] = useState(false);
  const [status,        setStatus]        = useState('');
  const [previewGrade,  setPreviewGrade]  = useState(null);
  const [previewEmenta, setPreviewEmenta] = useState(null);
  const [arquivos,      setArquivos]      = useState(() => ls('atlas_arquivos', []));

  const gradeRef  = useRef(null);
  const ementaRef = useRef(null);

  const saveArquivos = (list) => { setArquivos(list); lss('atlas_arquivos', list); };

  const toBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  const callAPI = async (messages, beta, maxTok=2048) => {
    const headers = {
      'Content-Type': 'application/json',
      'x-api-key': apiKey.trim(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    };
    if (beta) headers['anthropic-beta'] = beta;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers,
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: maxTok, messages })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    return res.json();
  };

  /* ── Upload grade → prévia ── */
  const uploadGrade = async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (!apiKey.trim()) { setStatus('err:Configure a chave API primeiro.'); return; }
    setLoadingGrade(true); setStatus('');
    try {
      const b64   = await toBase64(file);
      const isPdf = file.type === 'application/pdf';
      const src   = { type: 'base64', media_type: file.type, data: b64 };
      const data  = await callAPI([{ role:'user', content:[
        isPdf ? { type:'document', source:src } : { type:'image', source:src },
        { type:'text', text:
`Analise esta grade horária e extraia TODAS as aulas. Retorne APENAS um array JSON válido, sem explicações:
[{"subject":"Nome da Disciplina","day":1,"time":"08:00","room":"Sala 101"}]
day: 0=Dom 1=Seg 2=Ter 3=Qua 4=Qui 5=Sex 6=Sáb. time em HH:MM. Apenas o JSON.` }
      ]}], isPdf ? 'pdfs-2024-09-25' : undefined);
      const raw   = data.content[0].text;
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Resposta fora do formato esperado.');
      const aulas  = JSON.parse(match[0]);
      const corMap = {};
      let ci = 0;
      aulas.forEach(a => { if (!corMap[a.subject]) corMap[a.subject] = CORES[ci++ % CORES.length]; });
      setPreviewGrade({ aulas, corMap, fileName: file.name });
    } catch (err) { setStatus(`err:${err.message}`); }
    setLoadingGrade(false);
  };

  /* ── Confirmar grade ── */
  const confirmarGrade = () => {
    const { aulas, corMap, fileName } = previewGrade;
    const KEY  = ['dom','seg','ter','qua','qui','sex','sab'];
    const nova = { ...agenda };
    DIAS.forEach(d => { nova[d.k] = [...(nova[d.k] || [])]; });
    aulas.forEach(a => {
      const k = KEY[a.day];
      if (!k) return;
      nova[k].push({ id:uid(), hora:a.time, desc: a.room ? `${a.subject} — ${a.room}` : a.subject, cor: corMap[a.subject] });
    });
    setAgenda(nova); lss('atlas_agenda', nova);
    saveArquivos([...arquivos, { id:uid(), nome:fileName, tipo:'grade' }]);
    setPreviewGrade(null);
    setStatus(`ok:${aulas.length} aula(s) importada(s) para a Agenda.`);
  };

  /* ── Upload ementas → prévia ── */
  const uploadEmenta = async (e) => {
    const files = Array.from(e.target.files);
    e.target.value = '';
    if (!files.length) return;
    if (!apiKey.trim()) { setStatus('err:Configure a chave API primeiro.'); return; }
    setLoadingEmenta(true); setStatus('');
    const items = [];
    for (const file of files) {
      setStatus(`ok:Processando ${file.name}…`);
      try {
        const b64   = await toBase64(file);
        const isPdf = file.type === 'application/pdf';
        const src   = { type: 'base64', media_type: file.type, data: b64 };
        const data  = await callAPI([{ role:'user', content:[
          isPdf ? { type:'document', source:src } : { type:'image', source:src },
          { type:'text', text:
`Analise esta ementa/cronograma e extraia as informações. Retorne APENAS um objeto JSON válido, sem explicações:
{"subject":"Nome da Disciplina","professor":"Nome do Professor","topics":["Tópico 1","Tópico 2"],"examDates":["2025-06-15"],"cronograma":[{"date":"2025-03-10","theme":"Tema da aula","type":"expositiva","location":"Anfiteatro A","requiresJaleco":false}]}
type: expositiva | pratica | especial. requiresJaleco true se o local for hospital, UBS, Santa Casa, laboratório de habilidades, campo, etc (não sala de aula comum). Se não houver cronograma com datas específicas, retorne cronograma:[]. examDates e dates em YYYY-MM-DD. Apenas o JSON.` }
        ]}], isPdf ? 'pdfs-2024-09-25' : undefined, 4096);
        const raw   = data.content[0].text;
        const match = raw.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('Resposta fora do formato esperado.');
        items.push({ ...JSON.parse(match[0]), fileName: file.name });
      } catch (err) { setStatus(`err:Erro em "${file.name}": ${err.message}`); }
    }
    if (items.length) { setPreviewEmenta(items); setStatus(''); }
    setLoadingEmenta(false);
  };

  /* ── Confirmar ementas ── */
  const confirmarEmenta = () => {
    const novas = [...materias];
    const novasCron = [...(cronograma||[])];
    previewEmenta.forEach(em => {
      const idx = novas.findIndex(m => m.nome.toLowerCase() === (em.subject||'').toLowerCase());
      if (idx >= 0) {
        novas[idx] = { ...novas[idx], professor:em.professor, topics:em.topics||[], examDates:em.examDates||[] };
      } else {
        novas.push({ id:uid(), nome:em.subject, cor:CORES[novas.length % CORES.length],
                     perf:50, professor:em.professor, topics:em.topics||[], examDates:em.examDates||[] });
      }
      if (em.cronograma?.length) {
        em.cronograma.forEach(c => {
          const dup = novasCron.findIndex(x => x.date===c.date && x.subject===c.subject);
          if (dup >= 0) novasCron[dup] = c; else novasCron.push(c);
        });
      }
    });
    setMaterias(novas); lss('atlas_mat', novas);
    setCronograma(novasCron); lss('atlas_cronograma', novasCron);
    saveArquivos([...arquivos, ...previewEmenta.map(em => ({ id:uid(), nome:em.fileName, tipo:'ementa' }))]);
    setStatus(`ok:${previewEmenta.length} ementa(s) importada(s).`);
    setPreviewEmenta(null);
  };

  /* ── Deleção inline ── */
  const delAula    = (dayK, id) => { const n={...agenda,[dayK]:agenda[dayK].filter(e=>e.id!==id)}; setAgenda(n); lss('atlas_agenda',n); };
  const delMat     = (id) => {
    const m = materias.find(x=>x.id===id);
    const nm = materias.filter(x=>x.id!==id); setMaterias(nm); lss('atlas_mat',nm);
    if (m) {
      const nc=(cronograma||[]).filter(c=>c.subject.toLowerCase()!==m.nome.toLowerCase());
      setCronograma(nc); lss('atlas_cronograma',nc);
    }
  };
  const delArquivo = (id) => saveArquivos(arquivos.filter(a=>a.id!==id));
  const apagarTudo = () => {
    setMaterias([]); lss('atlas_mat',[]);
    setCronograma([]); lss('atlas_cronograma',[]);
    saveArquivos([]);
    lss('atlas_pdfs',[]);
  };

  /* ── Derivados ── */
  const KEY_NAMES  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const totalAulas  = Object.values(agenda).reduce((s, d) => s + d.length, 0);
  const matComDados = materias.filter(m => m.topics?.length || m.examDates?.length || m.professor);
  const temDados    = totalAulas > 0 || matComDados.length > 0;
  const isErr = status.startsWith('err:');
  const msg   = status.replace(/^(ok|err):/, '');

  return (
    <div>
      <div className="ph">
        <div className="ph-t">Importar</div>
        <div className="ph-s">Preencha agenda e matérias automaticamente com IA</div>
      </div>

      {/* Grade horária — upload ou prévia */}
      {!previewGrade ? (
        <div className="card">
          <div className="card-t"><IcoCal/> Grade Horária</div>
          <div style={{fontSize:'.82rem',color:'var(--muted)',marginBottom:12,lineHeight:1.5}}>
            PDF ou foto — revise as aulas encontradas antes de importar para a Agenda.
          </div>
          <input ref={gradeRef} type="file" accept="application/pdf,image/*"
            style={{display:'none'}} onChange={uploadGrade}/>
          <button className="btn btn-p btn-w btn-sm"
            onClick={() => gradeRef.current?.click()} disabled={loadingGrade}>
            {loadingGrade ? 'Processando…' : 'Enviar grade horária'}
          </button>
        </div>
      ) : (
        <div className="card fi">
          <div className="card-t" style={{marginBottom:14}}>
            <IcoCal/> Prévia — {previewGrade.aulas.length} aula(s) encontrada(s)
          </div>
          <div style={{marginBottom:14}}>
            {[...previewGrade.aulas]
              .sort((a,b) => a.day - b.day || a.time.localeCompare(b.time))
              .map((a,i) => (
                <div key={i} className="imp-ev" style={{marginBottom:5}}>
                  <div style={{width:9,height:9,borderRadius:'50%',
                    background:previewGrade.corMap[a.subject],flexShrink:0}}/>
                  <span style={{flex:1,minWidth:0,fontSize:'.82rem'}}>
                    <span style={{fontWeight:800,color:previewGrade.corMap[a.subject],marginRight:5,fontSize:'.72rem'}}>
                      {KEY_NAMES[a.day]}
                    </span>
                    <span style={{fontWeight:700,color:'var(--prim)',marginRight:6}}>{a.time}</span>
                    {a.subject}{a.room ? ` — ${a.room}` : ''}
                  </span>
                </div>
              ))
            }
          </div>
          <div className="f g8">
            <button className="btn btn-p" style={{flex:1,fontSize:'.82rem'}} onClick={confirmarGrade}>
              Confirmar e Importar
            </button>
            <button className="btn btn-g" style={{flex:1,fontSize:'.82rem'}} onClick={() => setPreviewGrade(null)}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* Planos de Aula — upload ou prévia */}
      {!previewEmenta ? (
        <div className="card">
          <div className="card-t"><IcoBook/> 📑 Planos de Aula</div>
          <div style={{fontSize:'.82rem',color:'var(--muted)',marginBottom:12,lineHeight:1.5}}>
            PDF de cada matéria — extrai tópicos gerais <strong>e</strong> o cronograma com datas específicas de cada aula.
          </div>
          <input ref={ementaRef} type="file" accept="application/pdf,image/*"
            multiple style={{display:'none'}} onChange={uploadEmenta}/>
          <button className="btn btn-p btn-w btn-sm"
            onClick={() => ementaRef.current?.click()} disabled={loadingEmenta}>
            {loadingEmenta ? 'Processando…' : 'Enviar planos de aula'}
          </button>
        </div>
      ) : (
        <div className="card fi">
          <div className="card-t" style={{marginBottom:14}}>
            <IcoBook/> Prévia — {previewEmenta.length} plano(s)
          </div>
          <div style={{marginBottom:14}}>
            {previewEmenta.map((em,i) => (
              <div key={i} style={{background:'var(--surf2)',borderRadius:'var(--r-sm)',
                                   padding:'12px 14px',marginBottom:8}}>
                <div style={{fontFamily:'Sora,sans-serif',fontWeight:600,
                              fontSize:'.9rem',marginBottom:2}}>{em.subject}</div>
                {em.professor && (
                  <div style={{fontSize:'.78rem',color:'var(--muted)',marginBottom:6}}>{em.professor}</div>
                )}
                {em.topics?.length > 0 && (
                  <div style={{marginBottom: em.cronograma?.length ? 8 : 0}}>
                    <div className="imp-section" style={{marginBottom:4}}>Tópicos</div>
                    {em.topics.slice(0,5).map((t,j) => (
                      <div key={j} style={{fontSize:'.78rem',color:'var(--text)',marginBottom:2}}>• {t}</div>
                    ))}
                    {em.topics.length > 5 && (
                      <div style={{fontSize:'.74rem',color:'var(--muted)',marginTop:2}}>
                        +{em.topics.length - 5} tópico(s)
                      </div>
                    )}
                  </div>
                )}
                {em.cronograma?.length > 0 && (
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                    <span style={{fontSize:'.72rem',fontWeight:800,color:'var(--prim)'}}>📅</span>
                    <span style={{fontSize:'.76rem',color:'var(--prim-l)',fontWeight:600}}>
                      {em.cronograma.length} aula(s) com data no cronograma
                    </span>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="f g8">
            <button className="btn btn-p" style={{flex:1,fontSize:'.82rem'}} onClick={confirmarEmenta}>
              Confirmar e Importar
            </button>
            <button className="btn btn-g" style={{flex:1,fontSize:'.82rem'}} onClick={() => setPreviewEmenta(null)}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* Status */}
      {status && !previewGrade && !previewEmenta && (
        <div className={isErr ? 'status-err' : 'status-ok'}>{msg}</div>
      )}

      {/* Arquivos enviados */}
      {arquivos.length > 0 && (
        <>
          <div className="card-t" style={{marginTop:4,marginBottom:10}}>
            <IcoUpload/> Arquivos enviados
          </div>
          {arquivos.map(a => (
            <div key={a.id} className="imp-ev fi" style={{marginBottom:6}}>
              <span style={{
                fontSize:'.68rem',fontWeight:800,padding:'2px 7px',borderRadius:'var(--r-f)',
                background: a.tipo==='grade' ? '#ede9fe' : a.tipo==='cronograma' ? '#dbeafe' : '#d1fae5',
                color:      a.tipo==='grade' ? '#6d28d9' : a.tipo==='cronograma' ? '#1e40af' : '#065f46',
                flexShrink: 0,
              }}>
                {a.tipo === 'grade' ? 'GRADE' : a.tipo === 'cronograma' ? 'CRON' : 'EMENTA'}
              </span>
              <span style={{flex:1,minWidth:0,fontSize:'.82rem',
                            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {a.nome}
              </span>
              <button className="btn-x" onClick={() => delArquivo(a.id)}>✕</button>
            </div>
          ))}
        </>
      )}

      {/* Dados importados */}
      {temDados && (
        <>
          <div className="f ac jb" style={{marginTop:14,marginBottom:12}}>
            <div className="card-t" style={{margin:0}}>
              <IcoCal/> Dados importados
            </div>
            <button className="btn btn-d btn-sm" style={{fontSize:'.75rem',padding:'5px 10px'}}
              onClick={apagarTudo}>
              🗑 Apagar tudo
            </button>
          </div>

          {totalAulas > 0 && (
            <div className="card fi">
              <div className="card-t" style={{marginBottom:12}}><IcoCal/> Agenda — {totalAulas} aula(s)</div>
              {DIAS.map(d => agenda[d.k]?.length ? (
                <div key={d.k} style={{marginBottom:12}}>
                  <div className="imp-section">{d.ext}</div>
                  {[...agenda[d.k]].sort((a,b)=>a.hora.localeCompare(b.hora)).map(ev => (
                    <div key={ev.id} className="imp-ev">
                      <span style={{flex:1,minWidth:0}}>
                        <span className="imp-ev-hora" style={{color: ev.cor||'var(--prim)'}}>{ev.hora}</span>
                        {ev.desc}
                      </span>
                      <button className="btn-x" onClick={() => delAula(d.k, ev.id)}>✕</button>
                    </div>
                  ))}
                </div>
              ) : null)}
            </div>
          )}

          {matComDados.map(m => (
            <div key={m.id} className="card fi" style={{position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:m.cor}}/>
              <div style={{paddingLeft:12}}>
                <div className="f ac jb mb10">
                  <div>
                    <div style={{fontFamily:'Sora,sans-serif',fontWeight:600,fontSize:'.92rem'}}>{m.nome}</div>
                    {m.professor && <div style={{fontSize:'.75rem',color:'var(--muted)',marginTop:2}}>{m.professor}</div>}
                  </div>
                  <button className="btn btn-d btn-sm" onClick={() => delMat(m.id)}><IcoTrash/></button>
                </div>
                {m.topics?.length > 0 && (
                  <div style={{marginBottom:10}}>
                    <div className="imp-section">Tópicos</div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {m.topics.map((t,i) => <div key={i} className="imp-tag">• {t}</div>)}
                    </div>
                  </div>
                )}
                {m.examDates?.length > 0 && (
                  <div>
                    <div className="imp-section">Avaliações</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {m.examDates.map((d,i) => {
                        const cd = countdown(d);
                        return (
                          <span key={i} className={`badge ${cd.cls}`}>
                            <IcoClock/>
                            {new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
                            {' · '}{cd.lbl}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {!temDados && arquivos.length === 0 && (
        <div className="empty">
          <IcoUpload/>
          <div className="empty-t">Nenhum dado importado ainda</div>
          <div className="empty-s">Envie uma grade ou ementa para começar</div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════ */
function App() {
  const [aba,        setAba]        = useState('inicio');
  const [apiKey,     setApiKey]     = useState(() => ls('atlas_apikey', ''));
  const [configOpen, setConfigOpen] = useState(false);
  const [agenda,     setAgenda]     = useState(() => { const v=ls('atlas_agenda',null); return v||{...AGENDA_VAZIA}; });
  const [materias,   setMat]        = useState(() => ls('atlas_mat',   []));
  const [provas,     setPro]        = useState(() => ls('atlas_pro',   []));
  const [eventos,    setEvs]        = useState(() => ls('atlas_eventos', []));
  const [schedule,   setSched]      = useState(() => ls('atlas_schedule', []));
  const [cronograma, setCron]       = useState(() => ls('atlas_cronograma', []));

  const ABAS = [
    { id:'inicio',   lbl:'Início',   Ico: IcoHome   },
    { id:'agenda',   lbl:'Agenda',   Ico: IcoCal    },
    { id:'importar', lbl:'Importar', Ico: IcoUpload },
    { id:'materias', lbl:'Matérias', Ico: IcoBook   },
    { id:'provas',   lbl:'Provas',   Ico: IcoClip   },
  ];

  const conteudo = (() => {
    switch (aba) {
      case 'inicio':   return <TabInicio   agenda={agenda} materias={materias} provas={provas}/>;
      case 'agenda':   return <TabAgenda   agenda={agenda} setAgenda={setAgenda} eventos={eventos} setEventos={setEvs} schedule={schedule} cronograma={cronograma}/>;
      case 'importar': return <TabImportar apiKey={apiKey}
                                           agenda={agenda} setAgenda={setAgenda}
                                           materias={materias} setMaterias={setMat}
                                           cronograma={cronograma} setCronograma={setCron}/>;
      case 'materias': return <TabMaterias materias={materias} setMaterias={setMat}/>;
      case 'provas':   return <TabProvas   provas={provas} setProvas={setPro} materias={materias}/>;
      default:         return null;
    }
  })();

  return (
    <>
      <header className="hdr">
        <div className="logo">
          <div className="logo-gem"/>
          <span>Atlas</span><span className="logo-so">So</span><span>Med</span>
        </div>
        <button className="btn-gear" onClick={() => setConfigOpen(true)} title="Configurações">
          <IcoGear/>
        </button>
      </header>

      {configOpen && (
        <ModalConfig apiKey={apiKey} setApiKey={setApiKey} onClose={() => setConfigOpen(false)}/>
      )}

      <main className="main">
        <div className="page">{conteudo}</div>
      </main>

      <nav className="bnav">
        {ABAS.map(({ id, lbl, Ico }) => (
          <button key={id} className={`ni ${aba===id?'on':''}`} onClick={()=>setAba(id)}>
            <Ico/><span className="ni-l">{lbl}</span>
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
